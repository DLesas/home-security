# =============================================================================
# Home Security System - Docker Compose
# =============================================================================
# Usage:
#   CPU Mode: docker compose --profile cpu up
#   GPU Mode: docker compose --profile gpu up (requires NVIDIA Container Toolkit)
# =============================================================================

services:
  # ===========================================================================
  # CORE SERVICES (included in both cpu and gpu profiles)
  # ===========================================================================

  redis:
    profiles: ["cpu", "gpu"]
    container_name: redis
    build:
      context: ./redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
      - "${REDIS_UI_PORT:-8001}:8001"
    volumes:
      - redis_data:/data
    deploy:
      replicas: 1
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 5s
    networks:
      - backend

  postgres:
    profiles: ["cpu", "gpu"]
    build:
      context: ./postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/home/postgres/pgdata/data
    deploy:
      replicas: 1
    restart: always
    user: root
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 5s
    networks:
      - backend

  web:
    profiles: ["cpu", "gpu"]
    build:
      context: ./webapp
    ports:
      - "3000:3000"
    networks:
      - backend

  backend:
    profiles: ["cpu", "gpu"]
    build:
      context: ./backend
    volumes:
      - camera_recordings:/recordings:ro
    environment:
      - DOCKER_ENV=true
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - EVENTS_CHANNEL=${EVENTS_CHANNEL}
      - SENSOR_WARNING_TEMPERATURE=${SENSOR_WARNING_TEMPERATURE}
      - SENSOR_CRITICAL_TEMPERATURE=${SENSOR_CRITICAL_TEMPERATURE}
      - SERVER_PORT=${SERVER_PORT:-8080}
      - SERVER_PASS=${SERVER_PASS}
      - SERVER_NAME=${SERVER_NAME}
      - UDP_BROADCAST_ADDR=${UDP_BROADCAST_ADDR}
      - UDP_BROADCAST_PORT=${UDP_BROADCAST_PORT:-41234}
      - CLIENT_TCP_PORT=${CLIENT_TCP_PORT:-31337}
      - BONJOUR_BROADCASTING_NAME=${BONJOUR_BROADCASTING_NAME}
      - BONJOUR_PORT=${BONJOUR_PORT:-4000}
      - BONJOUR_BROADCASTING_INTERVAL=${BONJOUR_BROADCASTING_INTERVAL:-10000}
      - ALARM_COOLDOWN_SECONDS=${ALARM_COOLDOWN_SECONDS:-30}
      - CAMERA_CONFIG_CHANNEL=${CAMERA_CONFIG_CHANNEL:-camera:config}
      - DEFAULT_MAX_STREAM_FPS=${DEFAULT_MAX_STREAM_FPS:-30}
      - DEFAULT_MAX_RECORDING_FPS=${DEFAULT_MAX_RECORDING_FPS:-15}
      - DEFAULT_OBJECT_DETECTION_MODEL=${DEFAULT_OBJECT_DETECTION_MODEL:-yolov8n}
      - DEFAULT_CLIP_PRE_DURATION=${DEFAULT_CLIP_PRE_DURATION:-10}
      - DEFAULT_CLIP_POST_DURATION=${DEFAULT_CLIP_POST_DURATION:-50}
      - DETECTION_CHANNEL_PREFIX=${DETECTION_CHANNEL_PREFIX:-detection:}
      - CONFIG_CHANGE_CHANNEL=${CONFIG_CHANGE_CHANNEL:-config:change}
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${SERVER_PORT:-8080}/health",
        ]
      interval: 30s
      retries: 5
      start_period: 30s
      timeout: 5s
    networks:
      - backend

  event-system:
    profiles: ["cpu", "gpu"]
    build:
      context: .
      dockerfile: ./eventService/Dockerfile
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - EVENTS_CHANNEL=${EVENTS_CHANNEL}
      - ACCESS_KEY=${ACCESS_KEY}
      - SECRET_KEY=${SECRET_KEY}
    restart: always
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  advertisement:
    profiles: ["cpu", "gpu"]
    build:
      context: .
      dockerfile: ./advertisementService/Dockerfile
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=localhost
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_HOST=localhost
      - REDIS_PORT=${REDIS_PORT:-6379}
      - EVENTS_CHANNEL=${EVENTS_CHANNEL}
      - SERVER_PORT=${SERVER_PORT:-8080}
      - SERVER_PASS=${SERVER_PASS}
      - SERVER_NAME=${SERVER_NAME}
      - UDP_BROADCAST_ADDR=${UDP_BROADCAST_ADDR}
      - UDP_BROADCAST_PORT=${UDP_BROADCAST_PORT:-41234}
      - CLIENT_TCP_PORT=${CLIENT_TCP_PORT:-31337}
      - BONJOUR_BROADCASTING_NAME=${BONJOUR_BROADCASTING_NAME}
      - BONJOUR_PORT=${BONJOUR_PORT:-4000}
      - BONJOUR_BROADCASTING_INTERVAL=${BONJOUR_BROADCASTING_INTERVAL:-10000}
    network_mode: "host"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - NET_BROADCAST
      - NET_RAW
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy

  caddy:
    profiles: ["cpu", "gpu"]
    build:
      context: ./caddy
    environment:
      - SERVER_PORT=${SERVER_PORT:-8080}
      - DOMAIN=backend.home.local
    restart: unless-stopped
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
      - target: 443
        published: 443
        protocol: udp
        mode: host
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data/caddy
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - backend

  # ===========================================================================
  # GPU-CAPABLE SERVICES - CPU VERSIONS
  # ===========================================================================

  camera-ingestion:
    profiles: ["cpu"]
    container_name: camera-ingestion
    build:
      context: .
      dockerfile: ./cameraIngestion/Dockerfile
    environment: &camera-ingestion-env
      - DOCKER_ENV=true
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - EVENTS_CHANNEL=${EVENTS_CHANNEL}
      - SERVER_PORT=8082
      - RECORDING_PATH=/recordings
      - RETENTION_DAYS=${RETENTION_DAYS:-7}
      - SEGMENT_DURATION_SECONDS=${SEGMENT_DURATION_SECONDS:-120}
      - AI_SAMPLING_RATE=${AI_SAMPLING_RATE:-3}
      - JPEG_QUALITY_MIN=${JPEG_QUALITY_MIN:-50}
      - JPEG_QUALITY_MAX=${JPEG_QUALITY_MAX:-80}
      - CPU_THRESHOLD_HIGH=${CPU_THRESHOLD_HIGH:-80}
      - CPU_THRESHOLD_LOW=${CPU_THRESHOLD_LOW:-50}
      - DEFAULT_STREAM_FPS=${DEFAULT_STREAM_FPS:-30}
      - DEFAULT_STREAM_WIDTH=${DEFAULT_STREAM_WIDTH:-1280}
      - DEFAULT_STREAM_HEIGHT=${DEFAULT_STREAM_HEIGHT:-720}
      - CAMERA_CONFIG_CHANNEL=${CAMERA_CONFIG_CHANNEL:-camera:config}
      - DEFAULT_MAX_STREAM_FPS=${DEFAULT_MAX_STREAM_FPS:-30}
      - DEFAULT_MAX_RECORDING_FPS=${DEFAULT_MAX_RECORDING_FPS:-15}
      - DETECTION_CHANNEL_PREFIX=${DETECTION_CHANNEL_PREFIX:-detection:}
      - CLIPS_PATH=${CLIPS_PATH:-/recordings/clips}
      - CLIP_COOLDOWN_SECONDS=${CLIP_COOLDOWN_SECONDS:-30}
    ports:
      - "8082:8082"
    volumes:
      - camera_recordings:/recordings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  motion-detection:
    profiles: ["cpu"]
    container_name: motion-detection
    build:
      context: ./motionDetection
      args:
        USE_GPU: "false"
    environment: &motion-detection-env
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - CONSUMER_GROUP=${CONSUMER_GROUP:-motion-detectors}
      - LOG_LEVEL=${MOTION_DETECTION_LOG_LEVEL:-INFO}
      - DEFAULT_MIN_CONTOUR_AREA=${DEFAULT_MIN_CONTOUR_AREA:-2500}
      - DEFAULT_MOTION_THRESHOLD=${DEFAULT_MOTION_THRESHOLD:-2.5}
      - CAMERA_CONFIG_CHANNEL=${CAMERA_CONFIG_CHANNEL:-camera:config}
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - backend

  object-detection:
    profiles: ["cpu"]
    container_name: object-detection
    build:
      context: ./objectDetection
    environment: &object-detection-env
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - CONFIG_REDIS_KEY=${CONFIG_REDIS_KEY:-config:default}
      - CONFIG_CHANGE_CHANNEL=${CONFIG_CHANGE_CHANNEL:-config:change}
      - CAMERA_CONFIG_CHANNEL=${CAMERA_CONFIG_CHANNEL:-camera:config}
      - DETECTION_CHANNEL_PREFIX=${DETECTION_CHANNEL_PREFIX:-detection:}
      - MOTION_CHANNEL_PREFIX=${MOTION_CHANNEL_PREFIX:-motion:}
      - WEIGHTS_DIR=/app/src/models/weights
    volumes:
      - yolo_weights:/app/src/models/weights
    depends_on:
      redis:
        condition: service_healthy
      motion-detection:
        condition: service_started
    restart: always
    networks:
      - backend

  # ===========================================================================
  # GPU-CAPABLE SERVICES - GPU VERSIONS
  # Requires: Linux + NVIDIA GPU + NVIDIA Container Toolkit
  # ===========================================================================

  camera-ingestion-gpu:
    profiles: ["gpu"]
    container_name: camera-ingestion
    build:
      context: .
      dockerfile: ./cameraIngestion/Dockerfile.nvidia
    environment: *camera-ingestion-env
    ports:
      - "8082:8082"
    volumes:
      - camera_recordings:/recordings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video]

  motion-detection-gpu:
    profiles: ["gpu"]
    container_name: motion-detection
    build:
      context: ./motionDetection
      args:
        USE_GPU: "true"
    environment: *motion-detection-env
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - backend
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  object-detection-gpu:
    profiles: ["gpu"]
    container_name: object-detection
    build:
      context: ./objectDetection
    environment: *object-detection-env
    volumes:
      - yolo_weights:/app/src/models/weights
    depends_on:
      redis:
        condition: service_healthy
      motion-detection-gpu:
        condition: service_started
    restart: always
    networks:
      - backend
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  backend:

volumes:
  caddy_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  camera_recordings:
    driver: local
  yolo_weights:
    driver: local
